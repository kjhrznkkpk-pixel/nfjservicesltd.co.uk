<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NFJ Services LTD</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #0f172a;
            color: white;
        }

        /* NAVBAR */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1e293b;
            padding: 12px 25px;
            flex-wrap: wrap;
        }

        .logo {
            height: 45px;
            max-width: 180px;
        }

        nav {
            display: flex;
            gap: 18px;
            flex-wrap: wrap;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-size: 15px;
            transition: 0.2s;
        }

        nav a:hover {
            color: #3b82f6;
        }

        /* HERO */
        .hero {
            text-align: center;
            padding: 90px 20px;
        }

        .hero h1 {
            font-size: 44px;
            margin-bottom: 10px;
        }

        .hero h2 {
            font-size: 20px;
            font-weight: normal;
            color: #94a3b8;
        }

        .hero p {
            margin-top: 18px;
            font-size: 16px;
            color: #cbd5e1;
        }

        .btn {
            display: inline-block;
            margin-top: 25px;
            background: #3b82f6;
            padding: 12px 26px;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.25s;
        }

        .btn:hover {
            background: #2563eb;
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 20px;
            background: #020617;
            font-size: 13px;
            color: #94a3b8;
            line-height: 1.6;
        }
