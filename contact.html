<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact - NFJ Services LTD</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

/* HEADER */
header {
    background: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
}

.logo {
    height: 200px;
    width: auto;
}

nav a {
    color: black;
    text-decoration: none;
    margin-left: 20px;
    font-size: 18px;
}

/* PAGE */
.container {
    max-width: 700px;
    margin: 60px auto;
    padding: 20px;
    text-align: center;
}

h1 {
    margin-bottom: 20px;
}

/* FORM */
form {
    display: flex;
    flex-direction: column;
    gap: 15px;
    margin-top: 30px;
}

input, textarea {
    padding: 12px;
    border-radius: 8px;
    border: none;
    font-size: 16px;
}

textarea {
    height: 150px;
    resize: none;
}

/* BUTTON */
button {
    background: #3b82f6;
    color: white;
    border: none;
    padding: 12px;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #2563eb;
}
</style>
</head>

<body>

<header>
    <img src="logo.png" class="logo">
    <nav>
        <a href="index.html">Home</a>
        <a href="services.html">Services</a>
        <a href="faq.html">FAQ</a>
    </nav>
</header>

<div class="container">

    <h1>Contact Us</h1>
    <p>Send us a message and we’ll get back to you.</p>

    <form action="https://formspree.io/f/xojblzeo" method="POST">

        <input type="text" name="name" placeholder="Your Name" required>

        <input type="email" name="email" placeholder="Your Email" required>

        <textarea name="message" placeholder="Your Message" required></textarea>

        <button type="submit">Send Message</button>

    </form>

</div>

</body>
</html>
