<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact - NFJ Services LTD</title>
<meta name="description" content="Contact NFJ Services LTD for electrical work, network cabling, tech installations, CCTV, TV mounting and maintenance services.">
<meta name="keywords" content="contact NFJ Services, electrical work, network cabling, CCTV installation, TV mounting, maintenance services">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html {
    scroll-behavior: smooth;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
}

/* HEADER */
header {
    position: sticky;
    top: 0;
    z-index: 1000;
    display: flex;
    flex-direction: column;
    align-items: center;
    background: white;
    padding: 10px 15px;
    overflow: hidden;
}

.logo {
    height: 210px;
    width: 100vw;
    max-width: 900px;
    object-fit: contain;
    transform: scale(1.18);
}

/* NAV */
nav {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: nowrap;
    gap: 5px;
    margin-top: 5px;
}

nav a {
    color: black;
    text-decoration: none;
    font-size: 18px;
    padding: 8px 10px;
    position: relative;
    white-space: nowrap;
}

nav a:hover,
nav a.active {
    color: #3b82f6;
}

nav a:not(:last-child)::after {
    content: "";
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    height: 18px;
    width: 1px;
    background: rgba(0, 0, 0, 0.3);
}

/* PAGE */
.container {
    max-width: 700px;
    margin: 60px auto;
    padding: 20px;
    text-align: center;
}

h1 {
    margin-bottom: 20px;
    font-size: 40px;
}

p {
    color: #cbd5e1;
    line-height: 1.6;
}

/* FORM */
form {
    display: flex;
    flex-direction: column;
    gap: 15px;
    margin-top: 30px;
}

input,
textarea {
    padding: 12px;
    border-radius: 8px;
    border: none;
    font-size: 16px;
    width: 100%;
    box-sizing: border-box;
}

textarea {
    height: 150px;
    resize: none;
}

/* BUTTON */
button {
    background: #3b82f6;
    color: white;
    border: none;
    padding: 12px;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #2563eb;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    background: #020617;
    font-size: 13px;
    color: #94a3b8;
    line-height: 1.6;
    margin-top: 60px;
}

/* MOBILE */
@media (max-width: 600px) {
    header {
        flex-direction: column;
        align-items: center;
        padding: 10px;
        overflow: hidden;
    }

    .logo {
        height: 205px;
        width: 100vw;
        max-width: none;
        object-fit: contain;
        transform: scale(1.22);
    }

    nav {
        flex-wrap: nowrap;
        justify-content: center;
        overflow-x: auto;
        width: 100%;
    }

    nav a {
        font-size: 14px;
        padding: 8px;
    }

    .container {
        margin: 30px auto;
        padding: 20px;
    }

    h1 {
        font-size: 30px;
    }
}
</style>
</head>

<body>

<header>
    <img src="logo.png" class="logo" alt="NFJ Services LTD Logo">

    <nav>
        <a href="index.html">Home</a>
        <a href="services.html">Services</a>
        <a href="contact.html" class="active">Contact</a>
        <a href="faq.html">FAQ</a>
        <a href="Reviews.html">Reviews</a>
    </nav>
</header>

<div class="container">

    <h1>Contact Us</h1>
    <p>Send us a message and we’ll get back to you.</p>

    <form action="https://formspree.io/f/xojblzeo" method="POST">

        <input type="text" name="name" placeholder="Your Name" required>

        <input type="email" name="email" placeholder="Your Email" required>

        <textarea name="message" placeholder="Your Message" required></textarea>

        <button type="submit">Send Message</button>

    </form>

</div>

<footer>
    © 2026 NFJ Services LTD — All rights reserved<br>
    Directors: Keith Andrews & Chris Lawton
</footer>

</body>
</html>
